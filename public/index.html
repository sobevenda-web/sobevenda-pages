<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SobeVenda Pages</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      animation: fadeIn 1s ease-in;
    }
    p {
      font-size: 20px;
      opacity: 0.9;
      margin-bottom: 30px;
      animation: fadeIn 1.5s ease-in;
    }
    .status {
      background: rgba(255, 255, 255, 0.2);
      padding: 20px 30px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      animation: fadeIn 2s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 SobeVenda Pages</h1>
    <p>Sistema de hospedagem de páginas funcionando!</p>
    <div class="status">
      ✅ Cloudflare Pages ativo<br>
      🔒 SSL configurado<br>
      🌐 Pronto para domínios customizados
    </div>
  </div>
</body>
</html>
